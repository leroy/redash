version: 2

project_name: redash

before:
  hooks:
    - go mod tidy

builds:
  - id: redash
    main: .
    binary: redash
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/leroy/redash/cmd.version={{.Version}}
      - -X github.com/leroy/redash/cmd.commit={{.Commit}}
      - -X github.com/leroy/redash/cmd.date={{.Date}}

archives:
  - id: redash
    formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto

brews:
  - name: redash
    repository:
      owner: leroy
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/leroy/redash"
    description: "Command-line client for the Redash REST API (agent-first)"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: bump {{ .ProjectName }} to {{ .Tag }}"
    skip_upload: auto
    install: |
      bin.install "redash"
    test: |
      assert_match "redash #{version}", shell_output("#{bin}/redash version")
      assert_match "Overview", shell_output("#{bin}/redash manual --list-topics")
